<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagenes</title>
    <!-- https://techicons.dev/icons/react -->
</head>
<body>
    <!-- Etiquetas de Bloque y etiquetas de Linea -->
    <h1>Imagenes</h1>
    <!-- Las imagenes se insertan en HTML utilizando la etiqueta img. Esta etiqueta es un elemento vacio, lo que significa que no tiene ninguna etiqueta de cierre. La sintaxis basica para insertar una imagen es: -->

    <!-- Vale la pena recordar que el atributo title proporciona un tooltip que se muestra  cuando el usuario pasa el mouse sobre la imagen -->
    <img src="04_imagen.png" alt="Logotipo de HTML5" width="200" height="200">
    <!-- Para que los lectores de pantalla puedan saber de que se trata la imagen el atributo alt (alternative text) es muy importante puesto que proporciona una descripcion textual de la imagen para accesibilidad y como fallback si no se carga. El texto alternativo debe ser descriptivo y conciso, y debe trasmitir la informacion esencial que la imagen representa. Por ejemplo, si la imagen es un logotipo de una empresa, el texto alternativo podria ser "Logotipo de empresa XYZ". Si la imagen es una fotografia de un paisaje, el texto alternativo podria ser "Fotografia de un paisaje con montañas y un logo". En resumen, el atributo alt proporciona una descripcion de la imagen en caso de que no se pueda cargar -->

    <!-- Self Closing Tags son etiquetas que se autocierran -->
    
</body>
</html>
