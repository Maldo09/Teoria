<body>
    <!-- Los enlaces o anclas o hipervinculos -->
    <!--a (anchor) significa ancla. Metafora: como en un barco te mantiene en una ubicacion especifica un ancla es justamente para que el usuario sepa hacia donde buscar un recurso o hacia donde navegar en la pagina web. -->

    <!-- Los atributos son caracteristicas que definen el compotamiento y la apariencia de los elementos en este caso el atributo href vuelve funcional a la etiqueta es por esta razon que se utiliza en el maquetado y no en el css dado que no es una caracteristica visual -->
    <!-- href(hyper reference) es la referencia a un curso, es decir, el destino del enlace-->
    <!-- Lo que esta dentro de la etiqueta a es el texto visible que el usuariovera en la pagina web, mientras que lo que esta dentro de href es la referencia al recurso al que apunta el enlace  -->

    <h2 title="titulo de la pagina"> Enlaces o anclas</h2>
    <!-- Por otra parte, el atributo title proporciona un texto de ayuda que se muestra cuando el usuario pasa el mouse sobre el enlace. Las tecnologias de asistencia como lectores de pantalla utilizan este atributo para proporcionar informacion adicional al usuario. En el caso de personas invidentes esto les permite acceder a informacion adicional sobre el enlace.-->
    
    <a href="https://www.google.com">Google</a>

    <a href="https://www.facebook.com">Facebook</a>
    <br>
    <a href="https://www.youtube.com/">Youtube</a>
